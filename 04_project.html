<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #90E0EF;
            margin: 0;
            padding: 20px;
        }

        .nav3 {
            border: 1px solid;
            background-color: #0077B6;
        }

        .nav3 ul {
            display: flex;
            list-style-type: none;
            justify-content: space-around;
            /* border: 1px solid; */
            margin: 20px;
            align-items: center;
        }

        .nav3 a {
            text-decoration: none;
            color: #CAF0F8;
            display: block;
            padding: 10px;
            /* border: 1px solid; */
            position: relative;
        }

        .nav3 .dropdown-content {
            display: none;
        }

        .nav3 .dropdown:hover .dropdown-content {
            display: block;
            position: absolute;
            background-color: #03045E;
            border: 1px solid;
            min-width: 150px;
        }

        .nav3 .dropdown-content a:hover {
            background-color: #90E0EF;
            color: #03045E;
        }

        .nav3 .login-btn {
            background-color: #90E0EF;
            color: #03045E;
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        .nav3 .login-btn:hover {
            background-color: #03045E;
            color: #90E0EF;
        }

        .nav3 a::after {
            content: "";
            position: absolute;
            height: 2px;
            width: 100%;
            bottom: 0;
            left: 0;
            background-color: black;
            transform: scaleX(0);
            transition: transform 0.5s ease-in-out;
        }

        .nav3 a:hover::after {
            transform: scaleX(1);
        }
    </style>
</head>

<body>
    <div class="nav-container">
        <div class="nav3">
            <ul>
                <li><a href="#">Home</a></li>
                <li class="dropdown">
                    <a href="#">About</a>
                    <div class="dropdown-content">
                        <a href="#">Our Story</a>
                        <a href="#">Team</a>
                        <a href="#">Newsroom</a>
                    </div>
                </li>
                <li><a href="#">Product</a></li>
                <li><a href="#">Contact Us</a></li>
                <button type="submit" class="login-btn">Login</button>
            </ul>
        </div>
    </div>
</body>

</html>
