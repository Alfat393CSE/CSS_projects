<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #323031;
            margin: 0px;
            padding: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: #084C61;
            border: 1px solid #177E89;
            padding: 100px;
            width: 300px;
            height: 200px;
            border-radius: 10px;
        }
        h2{
            text-align: center;
            margin-bottom: 50px;
            text-decoration: underline dotted;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input {
            margin-bottom: 5px;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #323031;
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #323031;
            background-color: #839073;
        }

        button:hover {
            background-color: #7CAE7A;
        }

    </style>
</head>
<body>
    <div class="card">
        <h2>Login Page</h2>
        <form>
            <input type="email" placeholder="Enter your email">
            <input type="password" placeholder="Enter your password">
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
