<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body {
            background-color: #242424;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .nav2 {
            background-color: #03643c;
            margin: 0;
            padding: 40px;
            width: 200px;
        }

        .nav2 ul {
            list-style-type: none;
            margin: 0;
            padding: 10px 15px;
        }

        .nav2 li {
            margin-bottom: 12px;
        }

        .nav2 a {
            text-decoration: none;
            color: #fff;
            margin: 5px;
            display: block;
            padding: 5px;
            width: 100%;
        }

        .nav2 a:hover {
            background-color: #137e0a;
        }

        .nav2 .login-btn {
            background-color: #048a2f;
            color: #fff;
            border: none;
            width: 100%;
            padding: 5px;
            margin-left: 5px;
        }

        .nav2 .login-btn:hover {
            background-color: #0a6126;
            border: 2px dotted black;
        }
    </style>
</head>

<body>
    <div class="nav-container">
        <div class="nav2">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Product</a></li>
                <li><a href="#">Contact Us</a></li>
                <button type="submit" class="login-btn">Login</button>
            </ul>
        </div>
    </div>
</body>

</html>
